<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Der · Die · Das</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Rubik', system-ui, sans-serif; }

    body {
      font-family: 'Rubik', system-ui, sans-serif;
      height: 100vh;
      overflow: hidden;
      background: #f0f0f0;
    }

    .hidden { display: none !important; }

    /* ════════════════════════════════════════
       SHARED MODAL OVERLAY WRAPPER
       ════════════════════════════════════════ */
    .modal-overlay-wrap {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    /* Topic modal gets more breathing room, no dark backdrop */
    #topic-modal-screen {
      padding: clamp(20px, calc(10.0735vw - 28.35px), 75px);
      background: transparent;
    }

    /* modal-type-1 box: max 900x600 */
    .modal-type-1 {
      background: #fff;
      border-radius: 18px;
      width: 100%;
      max-width: 900px;
      max-height: 600px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 16px 48px rgba(0,0,0,0.24);
    }

    /* ── SHARED MODAL HEADER ────────────────── */
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1px solid #e8e8e8;
      flex-shrink: 0;
    }
    .modal-header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .modal-header-title {
      font-size: 1.1rem;
      font-weight: 700;
    }
    .modal-header-right {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      color: #444;
    }
    .diff-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border: 1.5px solid #ddd;
      border-radius: 20px;
      font-size: 0.82rem;
    }

    .modal-body {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    /* ── SHARED BACK BUTTON ─────────────────── */
    .back-btn {
      padding: 6px 14px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      border: 1.5px solid #ccc;
      background: #fff;
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }
    .back-btn:hover { background: #f5f5f5; }

    /* ════════════════════════════════════════
       WELCOME SCREEN
       ════════════════════════════════════════ */
    #welcome-screen {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    #welcome-video-bg {
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
      background: #697E00;
    }
    #welcome-bg-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      display: block;
    }

    /* Push all welcome content above the bg */
    #welcome-screen > *:not(#welcome-video-bg) {
      position: relative;
      z-index: 1;
    }

    /* Frosted glass modal card */
    .welcome-modal {
      display: flex;
      flex-direction: column;
      gap: 29px;
      align-items: center;
      padding: clamp(20px, calc(4.0441vw + 0.59px), 42px) clamp(16px, calc(2.5735vw + 3.65px), 30px);
      border-radius: clamp(24px, calc(4.4118vw + 2.76px), 48px);
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      width: calc(100% - clamp(24px, 5vw, 60px) * 2);
      max-width: 460px;
      opacity: 1;
      transition: opacity 400ms cubic-bezier(0.45, 0, 0.55, 1);
    }
    .welcome-modal.fading {
      opacity: 0;
    }

    .welcome-title-block {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      text-align: center;
      color: #144e56;
    }
    .welcome-title-block h1 {
      font-size: clamp(46px, calc(2.5735vw + 33.65px), 60px);
      font-weight: 600;
      letter-spacing: -1px;
      line-height: 1.05;
    }
    .welcome-title-block p {
      font-size: clamp(19px, calc(0.9191vw + 14.59px), 24px);
      font-weight: 700;
      line-height: 1.3;
    }

    .diff-buttons {
      display: flex;
      flex-direction: column;
      gap: clamp(8px, calc(1.2868vw + 1.82px), 15px);
      width: 100%;
      max-width: clamp(270px, calc(16.544vw + 190.58px), 360px);
      align-items: stretch;
    }

    .diff-btn {
      width: 100%;
      height: clamp(100px, calc(8.0882vw + 60.88px), 144px);
      padding: clamp(12px, calc(1.1029vw + 6.71px), 18px) 19px;
      display: flex;
      align-items: center;
      gap: 20px;
      background: #fff;
      border: none;
      border-radius: 24px;
      box-shadow: 0px 4px 44px 0px rgba(0, 0, 0, 0.15);
      cursor: pointer;
      transition: transform 120ms, box-shadow 120ms;
      font-size: clamp(18px, calc(0.7353vw + 14.47px), 22px);
      font-weight: 700;
      color: #144e56;
      font-family: 'Rubik', sans-serif;
    }
    .diff-btn svg {
      width: clamp(88px, calc(4.9632vw + 64.18px), 115px);
      height: clamp(82px, calc(4.7794vw + 59.06px), 108px);
      flex-shrink: 0;
    }
    .diff-btn:active { box-shadow: 0px 4px 44px 0px rgba(0,0,0,0.15); }

    /* Smooth spring hover — transition alapú, cubic-bezier overshoot */
    .diff-btn {
      transition:
        transform 500ms cubic-bezier(0.34, 1.56, 0.64, 1),
        box-shadow 500ms cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .diff-btn:hover {
      transform: scale(1.05);
      box-shadow: 0px 12px 48px 0px rgba(0, 0, 0, 0.18);
    }

    #welcome-sound-btn {
      position: fixed;
      top: 16px;
      right: 16px;
      width: clamp(42px, calc(1.4706vw + 34.94px), 50px);
      height: clamp(42px, calc(1.4706vw + 34.94px), 50px);
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.30);
      border: none;
      border-radius: 100px;
      cursor: pointer;
      z-index: 500;
      transition: background 120ms;
    }
    #welcome-sound-btn:hover { background: rgba(255, 255, 255, 0.45); }


    /* ════════════════════════════════════════
       TOPIC MODAL
       ════════════════════════════════════════ */

    /* Frosted glass modal box */
    .modal-type-topic {
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      border-radius: clamp(24px, calc(4.4118vw + 2.76px), 48px);
      width: 100%;
      min-width: 280px;
      max-width: 960px;
      height: clamp(520px, 85vh, 600px);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.22);
      transform: translateX(calc(100vw + 120px));
      transition: transform 600ms cubic-bezier(0.45, 0, 0.55, 1);
    }
    .modal-type-topic.is-open {
      transform: translateX(0);
    }

    /* Topic modal header */
    .topic-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: clamp(12px, calc(2.5735vw + 6.65px), 19px) clamp(20px, calc(4.0441vw + 0.59px), 42px) 0;
      height: 109px;
      flex-shrink: 0;
    }
    .topic-header-left {
      display: flex;
      align-items: center;
      gap: 17px;
    }
    .topic-back-circle {
      width: clamp(42px, calc(1.4706vw + 34.94px), 50px);
      height: clamp(42px, calc(1.4706vw + 34.94px), 50px);
      border-radius: 50%;
      background: rgba(255,255,255,0.85);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.10);
      transition: background 120ms;
      flex-shrink: 0;
    }
    .topic-back-circle:hover { background: rgba(255,255,255,1); }
    .topic-modal-title-text {
      font-size: clamp(28px, calc(1.4706vw + 20.94px), 36px);
      font-weight: 600;
      color: #144e56;
      letter-spacing: -1px;
      line-height: 1;
    }
    .topic-header-right {
      display: flex;
      align-items: center;
      gap: 9px;
    }
    .topic-diff-label {
      font-size: clamp(14px, calc(0.5515vw + 11.35px), 17px);
      font-weight: 600;
      color: #144e56;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    /* Fluid difficulty icon SVG (JS-generated) */
    #topic-diff-icon-svg svg {
      width: clamp(27px, calc(1.4706vw + 19.94px), 35px) !important;
      height: auto !important;
    }

    /* Scroll container */
    #topic-scroll {
      display: flex;
      gap: 24px;
      padding: 16px clamp(16px, calc(4.2279vw - 4.29px), 39px) 38px;
      overflow-x: auto;
      overflow-y: hidden;
      flex: 1;
      align-items: flex-start;
      scrollbar-width: none;
    }
    #topic-scroll::-webkit-scrollbar { display: none; }

    /* Topic-element card: 325×450px */
    .topic-card {
      width: clamp(260px, calc(9.7892vw + 224.76px), 325px);
      min-width: clamp(260px, calc(9.7892vw + 224.76px), 325px);
      height: 450px;
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      background: #fff;
      flex-shrink: 0;
      position: relative;
      user-select: none;
      -webkit-user-select: none;
      transition: transform 220ms cubic-bezier(0.34,1.4,0.64,1), box-shadow 220ms ease;
    }
    .topic-card:hover {
      transform: translateY(-5px) scale(1.012);
      box-shadow: 0 16px 40px rgba(0,0,0,0.18);
    }

    /* Green progress bar — absolute top, proportional px width */
    .topic-card-progress {
      position: absolute;
      top: 0; left: 0;
      height: 6px;
      background: #1dba57;
      border-radius: 0 3px 3px 0;
      z-index: 4;
      transition: width 500ms ease;
    }

    /*
     * City illustration — 100% card width, natural aspect ratio,
     * anchored to the bottom of the card. No bottom crop.
     */
    .topic-card-img-wrap {
      position: absolute;
      bottom: 0; left: 0;
      width: 100%;
      z-index: 1;
      pointer-events: none;
    }
    .topic-card-img {
      width: 100%;
      height: auto;
      display: block;
    }

    /*
     * White gradient fade — blends the text area smoothly into the illustration.
     * Sits just above the image, transitioning white → transparent downward.
     */
    .topic-card-fade {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 60%;
      background: linear-gradient(
        to bottom,
        #ffffff 0%,
        rgba(255,255,255,0.9) 45%,
        rgba(255,255,255,0) 100%
      );
      pointer-events: none;
      z-index: 2;
    }

    /* Text content — sits above both image and gradient */
    .topic-card-content {
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 3;
      padding: 34px 12px 0;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .topic-card-titles {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .topic-card-city {
      font-size: clamp(18px, calc(0.7353vw + 14.47px), 22px);
      font-weight: 700;
      color: #1f2b2e;
      line-height: normal;
    }
    .topic-card-location {
      font-size: clamp(13px, calc(0.5515vw + 10.35px), 16px);
      font-weight: 400;
      color: #7a8082;
      line-height: normal;
    }
    .topic-card-divider {
      border: none;
      border-top: 1px solid #e0e0e0;
      width: 100%;
      margin: 0;
    }
    .topic-card-completed-row {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      white-space: nowrap;
    }
    .topic-card-completed-label {
      font-size: 13px;
      font-weight: 600;
      color: #1f454f;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .topic-card-completed-num {
      font-size: 16px;
      font-weight: 700;
      color: #1f2b2e;
    }

    /* ════════════════════════════════════════
       CITY MODAL
       ════════════════════════════════════════ */

    #city-modal-screen {
      padding: clamp(20px, calc(10.0735vw - 28.35px), 75px);
      background: transparent;
    }

    .modal-type-city {
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      border-radius: clamp(24px, calc(4.4118vw + 2.76px), 48px);
      width: 100%;
      min-width: 280px;
      max-width: 960px;
      height: auto;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.22);
      transform: translateX(calc(100vw + 120px));
      transition: transform 600ms cubic-bezier(0.45, 0, 0.55, 1);
    }
    .modal-type-city.is-open {
      transform: translateX(0);
    }
    .modal-type-topic {
      transition: transform 600ms cubic-bezier(0.45, 0, 0.55, 1),
                  opacity  400ms cubic-bezier(0.45, 0, 0.55, 1);
    }

    .city-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: clamp(12px, calc(2.5735vw + 6.65px), 19px) clamp(20px, calc(4.0441vw + 0.59px), 42px) 0;
      height: 109px;
      flex-shrink: 0;
    }
    .city-header-left {
      display: flex;
      align-items: center;
      gap: 17px;
    }
    .city-back-circle {
      width: clamp(42px, calc(1.4706vw + 34.94px), 50px);
      height: clamp(42px, calc(1.4706vw + 34.94px), 50px);
      border-radius: 50%;
      background: rgba(255,255,255,0.85);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.10);
      transition: background 120ms;
      flex-shrink: 0;
    }
    .city-back-circle:hover { background: rgba(255,255,255,1); }
    .city-modal-title-text {
      font-size: clamp(28px, calc(1.4706vw + 20.94px), 36px);
      font-weight: 600;
      color: #144e56;
      letter-spacing: -1px;
      line-height: 1;
    }
    .city-header-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
      flex-shrink: 0;
    }
    .city-header-completed-label {
      font-size: 13px;
      font-weight: 600;
      color: #1f454f;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      white-space: nowrap;
    }
    .city-header-completed-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .city-header-completed-num {
      font-size: 16px;
      font-weight: 700;
      color: #1f454f;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .city-header-track {
      width: 140px;
      height: 8px;
      background: rgba(255,255,255,0.5);
      border-radius: 100px;
      display: flex;
      overflow: hidden;
    }
    .city-header-seg {
      flex: 1;
      height: 100%;
      background: rgba(255,255,255,0.35);
      transition: background 300ms ease;
    }
    .city-header-seg.done {
      background: #1dba57;
    }

    /* Responsive: small modal — hide number, halve track width */
    @media (max-width: 450px) {
      .city-header-completed-num {
        display: none;
      }
      .city-header-track {
        width: 70px;
      }
    }

    #city-scroll {
      display: flex;
      gap: 24px;
      padding: 16px clamp(16px, calc(4.2279vw - 4.29px), 39px) 39px;
      overflow-x: auto;
      overflow-y: hidden;
      align-items: flex-start;
      scrollbar-width: none;
    }
    #city-scroll::-webkit-scrollbar { display: none; }

    /* City-element card: 363px wide */
    .city-card {
      width: clamp(280px, calc(12.5vw + 235.0px), 363px);
      min-width: clamp(280px, calc(12.5vw + 235.0px), 363px);
      max-height: clamp(380px, calc(36.7647vw + 159.41px), 600px);
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      background: #fff;
      flex-shrink: 0;
      padding: 0 22px 32px;
      box-shadow: 0 4px 32px 0 rgba(0,0,0,0.12);
      user-select: none;
      -webkit-user-select: none;
    }

    /* Header: decorative bg image + category icon + name */
    .city-card-header {
      position: relative;
      width: calc(100% + 44px); /* bleed past card padding */
      margin-left: -22px;
      margin-right: -22px;
      height: 86px;
      display: flex;
      align-items: center;
      padding: 0 24px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .city-card-header-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
    }
    .city-card-header-fade {
      position: absolute;
      inset: 0;
      background: linear-gradient(to right,
        #fff 0%,
        rgba(255,255,255,0.83) 64.8%,
        rgba(255,255,255,0) 98.9%
      );
      pointer-events: none;
    }
    .city-card-title-row {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      gap: 14px;
      overflow: hidden;
      width: 100%;
    }
    .city-card-icon-img {
      width: clamp(21px, calc(0.9191vw + 16.59px), 26px);
      height: clamp(21px, calc(0.9191vw + 16.59px), 26px);
      object-fit: contain;
      flex-shrink: 0;
    }
    .city-card-cat {
      font-size: clamp(17px, calc(0.7353vw + 13.47px), 21px);
      font-weight: 800;
      color: #1f454f;
      text-transform: uppercase;
      letter-spacing: 2.4px;
      white-space: nowrap;
    }

    /* High score block — vertically centered with even breathing room */
    .city-card-hs {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 20px 0;
    }
    .city-hs-label {
      font-size: clamp(13px, calc(0.5515vw + 10.35px), 16px);
      font-weight: 700;
      color: #1f454f;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      line-height: normal;
      white-space: nowrap;
    }
    .city-hs-value {
      font-size: clamp(21px, calc(0.9191vw + 16.59px), 26px);
      font-weight: 700;
      color: #1dba57;
      line-height: normal;
    }

    /* Completed topics bar */
    .city-completed {
      display: flex;
      flex-direction: column;
      gap: 6px;
      width: 100%;
    }
    .city-completed-label {
      font-size: 13px;
      font-weight: 600;
      color: #1f454f;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      line-height: normal;
    }
    .city-completed-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .city-completed-num {
      font-size: 16px;
      font-weight: 700;
      color: #1f454f;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .city-completed-track {
      flex: 1;
      height: 8px;
      background: #fff;
      border-radius: 100px;
      display: flex;
      gap: 3px;
      overflow: hidden;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,0.07);
    }
    .city-completed-seg {
      flex: 1;
      height: 100%;
      border-radius: 100px;
      background: #e8e8e8;
      transition: background 300ms ease;
    }
    .city-completed-seg.done {
      background: #1dba57;
    }

    /* Buttons */
    .city-card-actions {
      display: flex;
      flex-direction: column;
      gap: 18px;
      width: 100%;
    }
    .city-play-btn {
      width: 100%;
      height: 55px;
      border: none;
      border-radius: 100px;
      background: linear-gradient(to right, #50b47c, #42d776);
      color: #fff;
      font-size: clamp(22px, calc(1.1029vw + 16.71px), 28px);
      font-weight: 700;
      font-family: 'Rubik', sans-serif;
      cursor: pointer;
      box-shadow: 0 4px 0px #2e8a52, 0 6px 16px rgba(0,0,0,0.15);
      transform: translateY(0);
      transition: box-shadow 160ms ease, transform 160ms ease;
    }
    .city-play-btn:hover {
      box-shadow: 0 8px 0px #2e8a52, 0 12px 24px rgba(0,0,0,0.18);
      transform: translateY(-4px);
    }
    .city-play-btn:active {
      box-shadow: 0 1px 0px #2e8a52, 0 2px 6px rgba(0,0,0,0.15);
      transform: translateY(3px);
    }

    .city-words-btn {
      width: 100%;
      height: 55px;
      border: none;
      border-radius: 100px;
      background: #fff;
      box-shadow: 0 2px 36px 0 rgba(0,0,0,0.17);
      color: #1f454f;
      font-size: clamp(16px, calc(0.7353vw + 12.47px), 20px);
      font-weight: 700;
      font-family: 'Rubik', sans-serif;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: box-shadow 120ms, transform 80ms;
    }
    .city-words-btn:hover  { box-shadow: 0 4px 44px 0 rgba(0,0,0,0.22); }
    .city-words-btn:active { transform: scale(0.98); }
    .city-words-btn-icon {
      width: 17px;
      height: 15px;
      flex-shrink: 0;
      opacity: 0.7;
    }

    /* ════════════════════════════════════════
       WORD LIST SCREEN  (full screen)
       ════════════════════════════════════════ */
    #word-list-screen {
      position: fixed;
      inset: 0;
      background: linear-gradient(180deg, #B1C6BC 0%, #ADBC9A 100%);
      z-index: 200;
      overflow-y: auto;
    }

    #word-list-header {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 42px;
      height: clamp(80px, calc(9.191vw + 35.88px), 130px);
      flex-shrink: 0;
      background: transparent;
    }
    #word-list-back-btn {
      position: absolute;
      left: clamp(16px, calc(4.7794vw - 7.12px), 42px);
      top: 50%;
      transform: translateY(-50%);
      width: clamp(42px, calc(1.4706vw + 34.94px), 50px);
      height: clamp(42px, calc(1.4706vw + 34.94px), 50px);
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 120ms;
      flex-shrink: 0;
    }
    #word-list-back-btn:hover { background: rgba(255,255,255,0.45); }
    #word-list-header-title {
      font-size: clamp(26px, calc(1.4706vw + 18.94px), 34px);
      font-weight: 600;
      color: #fff;
      letter-spacing: -1px;
      text-align: center;
      white-space: nowrap;
    }

    #word-list-body {
      padding: clamp(12px, calc(2.2059vw + 1.41px), 24px);
    }

    #word-list-grid-wrap {
      max-width: 1300px;
      margin: 0 auto;
      container-type: inline-size;
    }

    #word-list-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      column-gap: 26px;
      row-gap: 12px;
    }

    @container (max-width: 1024px) {
      #word-list-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
    @container (max-width: 499px) {
      #word-list-grid {
        grid-template-columns: 1fr;
      }
    }

    /* Word-item: white card, shadow, horizontal layout */
    .word-item {
      background: #fff;
      border-radius: 4px;
      box-shadow: 0 2px 10px 0 rgba(0,0,0,0.1);
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      justify-content: space-between;
      padding: 20px 26px;
      gap: 4px 16px;
      width: 100%;
      box-sizing: border-box;
    }
    .word-item-left {
      display: flex;
      align-items: baseline;
      gap: 6px;
      flex: 1;
      min-width: 110px;
    }
    .word-item-article {
      font-size: clamp(15px, calc(0.7353vw + 11.47px), 19px);
      font-weight: 700;
      flex-shrink: 0;
      width: 36px;
      line-height: normal;
    }
    .word-item-article.art-der { color: #68c6fd; }
    .word-item-article.art-die { color: #F14949; }
    .word-item-article.art-das { color: #F2B25B; }
    .word-item-german {
      font-size: clamp(16px, calc(0.7353vw + 12.47px), 20px);
      font-weight: 700;
      color: #333232;
      line-height: normal;
      min-width: 0;
      overflow-wrap: break-word;
      word-break: break-word;
      hyphens: auto;
      -webkit-hyphens: auto;
      lang: de;
    }
    .word-item-english {
      font-size: clamp(16px, calc(0.7353vw + 12.47px), 20px);
      font-weight: 400;
      color: #333232;
      line-height: normal;
      flex-shrink: 0;
      text-align: right;
      word-break: break-word;
    }

    /* ════════════════════════════════════════
       GAME SCREEN
       ════════════════════════════════════════ */
    #game-screen {
      position: fixed;
      inset: 0;
      z-index: 300;
      overflow: hidden;
    }

    #video-bg {
      position: absolute;
      inset: 0;
      background-color: #C7AD8D;
      z-index: 0;
      overflow: hidden;
    }

    #video-bg video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
    }

    /* ── NAVBAR ── */
    #navbar {
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: clamp(10px, 1.6vw, 16px) clamp(12px, 2.4vw, 24px);
    }

    /* ── DESKTOP: navbar is flex, items in two groups via space-between ─ */
    #navbar { gap: clamp(10px, 2vw, 20px); }
    /* left group: back + hs */
    .nb-back { order: 1; }
    .nb-hs   { order: 2; }
    /* right group: round + score + sound */
    .nb-round { order: 3; margin-left: auto; }
    .nb-sc    { order: 4; }
    .nb-sound { order: 5; }

    /* ── MOBILE NAVBAR ≤ 460px ─────────────────── */
    @media (max-width: 460px) {
      #navbar {
        flex-wrap: wrap;
        align-items: flex-start;
        padding: 12px 14px;
        gap: 8px 10px;
      }
      /* Row 1 left: back + sound   Row 1 right: score */
      /* Row 2 left: round bar      Row 2 right: hs    */
      .nb-back  { order: 1; }
      .nb-sound { order: 2; }
      .nb-sc    { order: 3; margin-left: auto; }
      .nb-round { order: 4; flex-basis: auto; margin-left: 0; }
      .nb-hs    { order: 5; margin-left: auto; }
      /* pill sizing */
      .nb-hs, .nb-sc { width: 61px; padding: 3px 0 4px; }
      .nav-pill-label { font-size: 9px; }
      .nav-pill-value { font-size: 20px; }
      /* round bar sizing */
      .nb-round { padding: 0; height: auto; }
      .round-bar-track { width: 87px; height: 8px; }
      .round-label { font-size: 15px; }
    }

    /* icon buttons — white circle, matching topic/city back style */
    .nav-icon-btn {
      width: clamp(36px, 3.5vw, 50px);
      height: clamp(36px, 3.5vw, 50px);
      border-radius: 50%;
      border: none;
      cursor: pointer;
      background: rgba(255,255,255,0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.10);
      transition: background 120ms;
      flex-shrink: 0;
    }
    .nav-icon-btn:hover { background: rgba(255,255,255,1); }
    #sound-btn { background: rgba(255,255,255,0.30); }
    #sound-btn:hover { background: rgba(255,255,255,0.45); }
    .nav-icon-btn svg { width: 52%; height: 52%; }

    /* pill stats */
    .nav-pill {
      background: rgba(255,255,255,0.2);
      border-radius: 100px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
      backdrop-filter: blur(6px);
      padding: clamp(3px, 0.5vw, 5px) 0;
      line-height: 1.1;
    }
    .nav-pill-hs   { width: clamp(76px, 9vw, 106px); }
    .nav-pill-sc   { width: clamp(60px, 7vw, 82px); }
    .nav-pill-label {
      font-size: clamp(9px, 0.9vw, 13px);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .nav-pill-value {
      font-size: clamp(18px, 2.1vw, 30px);
      font-weight: 800;
    }

    /* round bar */
    .nav-round {
      display: flex;
      align-items: center;
      gap: clamp(8px, 1.1vw, 16px);
      padding: 0 clamp(10px, 1.4vw, 20px);
      height: clamp(36px, 5vw, 50px);
    }
    .round-bar-track {
      background: rgba(255,255,255,0.2);
      border-radius: 100px;
      height: clamp(6px, 0.7vw, 10px);
      width: clamp(100px, 12.8vw, 184px);
      overflow: hidden;
    }
    .round-bar-fill {
      height: 100%;
      background: rgba(255,255,255,0.6);
      border-radius: 100px;
      transition: width 400ms ease;
    }
    .round-label {
      font-size: clamp(13px, 1.4vw, 20px);
      font-weight: 700;
      color: #fff;
      white-space: nowrap;
    }

    /* ── BALLOON + WORD FRAME ── */
    #balloon-group {
      position: absolute;
      left: 50%;
      z-index: 5;
      display: flex;
      align-items: flex-start;
      width: 328px;
    }
    #balloons-row {
      display: flex;
      justify-content: space-around;
      width: 100%;
      padding: 0 clamp(10px, 2vw, 30px);
      align-items: flex-end;
    }
    #word-with-balloon {
      position: relative;
      width: 328px;
      height: 218px;
    }
    .balloon-img {
      position: absolute;
      z-index: 0;
      transform-origin: center 10%;
      pointer-events: none;
    }

    /* Flag-style word frame — SVG shape with text overlay */
    #word-frame {
      position: absolute;
      top: 103.83px;
      left: 0;
      width: 328px;
      height: 114px;
      z-index: 1;
    }
    #word-flag-svg {
      display: block;
      width: 100%;
      height: 100%;
    }
    #word-frame-text {
      position: relative;
      z-index: 1;
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 8% 14% 12% 14%;
      text-align: center;
      transform: rotate(-5deg);
    }
    #word-frame .german {
      font-size: 27px;
      font-weight: 700;
      color: #454545;
      white-space: nowrap;
      line-height: 1.2;
    }
    #word-frame .english {
      font-size: 16px;
      color: #6b6b6b;
      margin-top: 1px;
      line-height: 1.2;
    }

    /* ── BOTTOM BUTTONS ── */
    #bottom-bar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      z-index: 10;
      display: flex;
      gap: clamp(10px, 1.2vw, 17px);
      padding: clamp(16px, 2vw, 24px) clamp(20px, 3vw, 34px);
      justify-content: center;
      align-items: center;
      background: linear-gradient(to top, rgba(0,0,0,0.5), rgba(0,0,0,0));
    }

    /* Frosted pill wrapper around the three buttons */
    #article-btn-wrap {
      display: flex;
      gap: clamp(10px, 1.2vw, 17px);
      align-items: center;
      padding: clamp(14px, 1.7vw, 24px) clamp(22px, 2.4vw, 34px);
      border-radius: 100px;
      background: rgba(255,255,255,0.01);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
    }
    .article-btn {
      width: clamp(72px, 9.5vw, 100px);
      height: clamp(72px, 9.5vw, 100px);
      font-size: clamp(16px, 2vw, 28px);
      font-weight: 800;
      letter-spacing: -0.01em;
      text-transform: uppercase;
      cursor: pointer;
      border: none;
      border-radius: 50%;
      color: #fff;
      transition: transform 80ms, box-shadow 80ms;
      flex-shrink: 0;
    }
    .article-btn[data-article="der"] {
      background: #68c6fd;
      box-shadow: 0 9px 0 0 #547c98;
    }
    .article-btn[data-article="die"] {
      background: #d05a5a;
      box-shadow: 0 9px 0 0 #974541;
    }
    .article-btn[data-article="das"] {
      background: #f4b454;
      box-shadow: 0 9px 0 0 #a1723f;
    }
    .article-btn:hover:not(:disabled) { transform: scale(1.06); }
    .article-btn:active:not(:disabled) {
      transform: translateY(5px);
      box-shadow: 0 4px 0 0 currentColor;
    }
    .article-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    /* ── CHECK ICON ── */
    #check-icon {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0);
      opacity: 0;
      z-index: 20;
      pointer-events: none;
      transition: transform 200ms ease-out, opacity 200ms ease-out;
    }
    #check-icon.show {
      transform: translate(-50%, -50%) scale(1);
      opacity: 1;
    }
    #check-icon svg { width: clamp(60px, 8vw, 90px); height: clamp(60px, 8vw, 90px); }

    /* ── INCORRECT MODAL ── */
    #game-modal-overlay {
      position: absolute;
      inset: 0;
      background: transparent;
      z-index: 30;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    #game-modal-box {
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      border-radius: clamp(24px, 3.3vw, 48px);
      padding: clamp(24px, 3.1vw, 45px) clamp(24px, 4.2vw, 60px);
      text-align: center;
      max-width: clamp(300px, 32vw, 460px);
      width: 90%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(18px, 2.9vw, 42px);
    }
    .gm-title {
      font-size: clamp(28px, 4.2vw, 60px);
      font-weight: 600;
      color: #f14949;
      letter-spacing: -1px;
      line-height: 1;
    }
    .gm-title.correct { color: #42d776; }

    .gm-correct-block {
      display: flex;
      flex-direction: column;
      gap: clamp(6px, 0.8vw, 12px);
      align-items: center;
      width: 100%;
    }
    .gm-label {
      font-size: clamp(11px, 1.2vw, 17px);
      font-weight: 600;
      text-transform: uppercase;
      color: #144e56;
      letter-spacing: 0.3px;
    }
    .gm-article-word {
      font-size: clamp(16px, 1.9vw, 27px);
      font-weight: 700;
      color: #454545;
    }
    .gm-article-word .article-colored { color: #f4b454; }
    .gm-article-word .article-colored.der { color: #68c6fd; }
    .gm-article-word .article-colored.die { color: #d05a5a; }
    .gm-article-word .article-colored.das { color: #f4b454; }
    .gm-english {
      font-size: clamp(11px, 1.1vw, 16px);
      color: #6b6b6b;
    }

    .gm-scores {
      display: flex;
      flex-direction: row;
      gap: clamp(30px, 6.5vw, 94px);
      align-items: center;
      justify-content: center;
    }
    .gm-score-col {
      display: flex;
      flex-direction: column;
      gap: clamp(3px, 0.35vw, 5px);
      align-items: center;
    }
    .gm-score-label {
      font-size: clamp(11px, 1.2vw, 17px);
      font-weight: 600;
      text-transform: uppercase;
      color: #144e56;
    }
    .gm-score-value {
      font-size: clamp(19px, 1.6vw, 23px);
      font-weight: 700;
      color: #fff;
    }

    .gm-buttons {
      display: flex;
      flex-direction: column;
      gap: clamp(4px, 0.55vw, 8px);
      width: 100%;
    }
    #try-again-btn {
      width: 100%;
      height: clamp(48px, 4.9vw, 70px);
      font-size: clamp(18px, 1.9vw, 28px);
      font-weight: 700;
      cursor: pointer;
      border: none;
      border-radius: 100px;
      color: #fff;
      background: linear-gradient(to right, #50b47c, #42d776);
      box-shadow: 0 4px 0px #2e8a52, 0 6px 16px rgba(0,0,0,0.15);
      transform: translateY(0);
      transition: box-shadow 160ms ease, transform 160ms ease;
    }
    #try-again-btn:hover {
      box-shadow: 0 8px 0px #2e8a52, 0 12px 24px rgba(0,0,0,0.18);
      transform: translateY(-4px);
    }
    #try-again-btn:active {
      box-shadow: 0 1px 0px #2e8a52, 0 2px 6px rgba(0,0,0,0.15);
      transform: translateY(3px);
    }
    #main-menu-btn {
      width: 100%;
      height: clamp(48px, 4.9vw, 70px);
      font-size: clamp(15px, 1.6vw, 23px);
      font-weight: 700;
      cursor: pointer;
      border: none;
      border-radius: 100px;
      background: transparent;
      color: #144e56;
      transition: opacity 100ms;
    }
    #main-menu-btn:hover { opacity: 0.7; }

    /* Popper Lottie overlays */
    .popper-overlay {
      position: absolute;
      pointer-events: none;
      z-index: 10;
    }
    #popper-left {
      width: 420px;
      height: 420px;
      left: calc(38px + 39px - 210px);
      top: calc(65px - 210px);
    }
    #popper-right {
      width: 340px;
      height: 340px;
      left: calc(222px + 30px - 170px);
      top: calc(64px - 170px);
    }

    /* ── BALLOON ANIMATIONS ─────────────────── */
    @keyframes balloonPop {
      0%   { transform: scale(1);    opacity: 1; }
      35%  { transform: scale(1.38); opacity: 0.85; }
      100% { transform: scale(0.05); opacity: 0; }
    }
    .balloon-img.pop { animation: balloonPop 300ms ease-out forwards; }

    @keyframes frameFall {
      0%   { transform: translateY(0);    opacity: 1; }
      100% { transform: translateY(90vh); opacity: 0.5; }
    }
    #word-frame.fall { animation: frameFall 600ms ease-in forwards; }
  </style>
</head>
<body>

<!-- ══ Zene ══ -->
<audio id="audio-menu" src="Menu-Music.mp3"    loop preload="auto"></audio>
<audio id="audio-game" src="Gameplay-Music.mp3" loop preload="auto"></audio>

<!-- ═══════════════════════════════════════════════
     1. WELCOME SCREEN
════════════════════════════════════════════════ -->
<div id="welcome-screen">
  <div id="welcome-video-bg"><video id="welcome-bg-video" autoplay loop muted playsinline><source src="welcome-bg.mp4" type="video/mp4"></video></div>
  <div class="welcome-modal">
    <div class="welcome-title-block">
      <h1>Welcome!</h1>
      <p>Select the difficulty that suits you the best</p>
    </div>
    <div class="diff-buttons">
      <button class="diff-btn" data-level="Basic"><svg width="115" height="108" viewBox="0 0 115 108" fill="none" xmlns="http://www.w3.org/2000/svg"><rect width="115" height="108" rx="24" fill="#DFE6EA"/><path d="M8 24C8 15.1634 15.1634 8 24 8H41V100H24C15.1634 100 8 92.8366 8 84V24Z" fill="#1CB0F6"/><rect x="41" y="8" width="33" height="92" fill="#DFE6EA"/><path d="M74 8H91C99.8366 8 107 15.1634 107 24V84C107 92.8366 99.8366 100 91 100H74V8Z" fill="#DFE6EA"/></svg>Basic</button>
      <button class="diff-btn" data-level="Intermediate"><svg width="115" height="108" viewBox="0 0 115 108" fill="none" xmlns="http://www.w3.org/2000/svg"><rect width="115" height="108" rx="24" fill="#DFE6EA"/><path d="M8 24C8 15.1634 15.1634 8 24 8H41V100H24C15.1634 100 8 92.8366 8 84V24Z" fill="#78C801"/><rect x="41" y="8" width="33" height="92" fill="#78C801"/><path d="M74 8H91C99.8366 8 107 15.1634 107 24V84C107 92.8366 99.8366 100 91 100H74V8Z" fill="#DFE6EA"/></svg>Intermediate</button>
      <button class="diff-btn" data-level="Advanced"><svg width="115" height="108" viewBox="0 0 115 108" fill="none" xmlns="http://www.w3.org/2000/svg"><rect width="115" height="108" rx="24" fill="#DFE6EA"/><path d="M8 24C8 15.1634 15.1634 8 24 8H41V100H24C15.1634 100 8 92.8366 8 84V24Z" fill="#FF9601"/><path d="M74 8H91C99.8366 8 107 15.1634 107 24V84C107 92.8366 99.8366 100 91 100H74V8Z" fill="#FF9601"/><rect x="41" y="8" width="33" height="92" fill="#FF9601"/></svg>Advanced</button>
    </div>
  </div>
</div>

let DB = [];  // { article, german, english, difficulty, topic }

// Kumulatív nehézség: Basic → B, Intermediate → B+M, Advanced → B+M+A
const DIFF_LEVELS = { Basic: 1, Intermediate: 2, Advanced: 3 };
const CODE_LEVEL  = { B: 1, M: 2, A: 3 };

function getWords(csvTopic, difficulty) {
  const maxLevel = DIFF_LEVELS[difficulty] || 1;
  return DB.filter(w => w.topic === csvTopic && CODE_LEVEL[w.difficulty] <= maxLevel);
}

async function loadDB() {
  try {
    const res = await fetch('Nouns.csv');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    const lines = text.split('\n');
    // Row 0 is header; data starts at row 1
    for (let i = 1; i < lines.length; i++) {
      const cols = lines[i].split(',');
      if (cols.length < 5) continue;
      const article    = cols[0].trim().toLowerCase();
      const german     = cols[1].trim();
      const english    = cols[2].trim();
      const difficulty = cols[3].trim();
      const topic      = cols[4].trim();
      if (!['der','die','das'].includes(article)) continue;
      if (!['B','M','A'].includes(difficulty))    continue;
      if (!german || !topic) continue;
      DB.push({ article, german, english, difficulty, topic });
    }
    console.log(`DB loaded: ${DB.length} words`);
  } catch (e) {
    console.warn('Could not load Nouns.csv — game will use an empty word list.', e);
  }
}

let lottiePopperLeft  = null;
let lottiePopperRight = null;

function initPoppers() {
  const makePopper = (container, mirror) => {
    const anim = lottie.loadAnimation({
      container,
      renderer: 'svg',
      loop: false,
      autoplay: false,
      animationData: JSON.parse(JSON.stringify(POPPER_DATA)),
    });
    if (mirror) {
      container.style.transform = 'scaleX(-1)';
    }
    return anim;
  };
  if (lottiePopperLeft)  { lottiePopperLeft.destroy();  }
  if (lottiePopperRight) { lottiePopperRight.destroy(); }
  lottiePopperLeft  = makePopper($('popper-left'),  false);
  lottiePopperRight = makePopper($('popper-right'), true);
}

function playPoppers() {
  $('popper-left').classList.remove('hidden');
  $('popper-right').classList.remove('hidden');
  if (lottiePopperLeft)  { lottiePopperLeft.setSpeed(2);  lottiePopperLeft.play();  }
  if (lottiePopperRight) { lottiePopperRight.setSpeed(2); lottiePopperRight.play(); }
}

const state = {
  view:             'welcome',
  difficulty:       null,
  selectedTopic:    null,
  selectedCategory: null,
  highScore:        0,
  soundOn:          true,
  // game
  round:     1,
  score:     0,
  usedIdxs:  [],
  word:      null,
  phase:     'idle',
  startTime: 0,
  rafId:     null,
  balloonY:  0,
  riseSpeed: 2,
};

const TOTAL_ROUNDS     = 5;
const RISE_DURATION_MS = 6100;

// ════════════════════════════════════════════════
//  DOM REFS
// ════════════════════════════════════════════════
const $ = id => document.getElementById(id);

const SCREENS = {
  welcome:  $('welcome-screen'),
  topic:    $('topic-modal-screen'),
  city:     $('city-modal-screen'),
  wordlist: $('word-list-screen'),
  game:     $('game-screen'),
};

// ════════════════════════════════════════════════
//  ROUTER
// ════════════════════════════════════════════════
function showView(name) {
  // These views are modal overlays — welcome screen stays visible behind them
  const overlayViews = ['topic', 'city'];
  const keepWelcome  = overlayViews.includes(name);

  Object.entries(SCREENS).forEach(([key, el]) => {
    if (key === 'welcome') {
      el.classList.toggle('hidden', !keepWelcome && name !== 'welcome');
    } else {
      el.classList.toggle('hidden', key !== name);
    }
  });

  // Welcome modal fade-out when entering topic/city, restore when leaving
  const welcomeModal = document.querySelector('.welcome-modal');
  if (name === 'topic') {
    // Fade out welcome modal, then hide it after transition
    welcomeModal.classList.remove('hidden');
    welcomeModal.classList.add('fading');
    setTimeout(() => welcomeModal.classList.add('hidden'), 400);
  } else if (name === 'city') {
    welcomeModal.classList.add('hidden');
  } else {
    // Restore welcome modal instantly (no animation needed coming back)
    welcomeModal.classList.remove('fading', 'hidden');
  }

  // Slide-up animation for topic modal
  const topicBox = document.querySelector('.modal-type-topic');
  if (name === 'topic') {
    // Remove class first (instant reset), then re-add after one frame to trigger transition
    topicBox.classList.remove('is-open');
    requestAnimationFrame(() => requestAnimationFrame(() => topicBox.classList.add('is-open')));
  } else {
    topicBox.classList.remove('is-open');
  }

  state.view = name;

  // welcome-sound-btn only on non-game screens; game has its own sound-btn
  $('welcome-sound-btn').classList.toggle('hidden', name === 'game');

  if (name === 'game') {
    playGameMusic();
  } else if (['welcome','topic','city','wordlist'].includes(name)) {
    playMenuMusic();
  }
}

// ════════════════════════════════════════════════
//  NAVIGATION
// ════════════════════════════════════════════════
function goToWelcome() {
  stopGame();

  const topicBox    = document.querySelector('.modal-type-topic');
  const welcomeModal = document.querySelector('.welcome-modal');

  // 1. Slide topic modal back to the right
  topicBox.classList.remove('is-open');

  // 2. Show welcome modal immediately but transparent, then fade in
  welcomeModal.classList.remove('hidden');
  welcomeModal.classList.add('fading');
  requestAnimationFrame(() => requestAnimationFrame(() => {
    welcomeModal.classList.remove('fading');
  }));

  // 3. After slide-out finishes, hide topic screen properly
  setTimeout(() => {
    showView('welcome');
  }, 600);
}

function goToTopic(difficulty) {
  state.difficulty = difficulty;
  $('topic-diff-label').textContent  = difficulty.toUpperCase();
  $('topic-diff-icon-svg').innerHTML = diffIconSVG(difficulty);
  renderTopicCards();
  showView('topic');
}

function goToCity(topic) {
  state.selectedTopic = topic;
  $('city-modal-title').textContent = topic.name;
  $('city-completed-num').textContent = `${topic.completed}/${topic.total}`;

  // Build segmented bar in header
  const track = $('city-header-track');
  track.innerHTML = '';
  for (let i = 0; i < topic.total; i++) {
    const seg = document.createElement('div');
    seg.className = 'city-header-seg' + (i < topic.completed ? ' done' : '');
    track.appendChild(seg);
  }

  renderCityCards(topic);

  const topicBox = document.querySelector('.modal-type-topic');
  const cityBox  = document.querySelector('.modal-type-city');

  // 1. Fade topic modal out
  topicBox.style.opacity = '0';

  // 2. Simultaneously slide city modal in — show city screen first (off-screen)
  $('city-modal-screen').classList.remove('hidden');
  state.view = 'city';
  cityBox.classList.remove('is-open');
  requestAnimationFrame(() => requestAnimationFrame(() => cityBox.classList.add('is-open')));

  // 3. After fade, hide topic screen and reset opacity
  setTimeout(() => {
    $('topic-modal-screen').classList.add('hidden');
    topicBox.style.opacity = '';
  }, 400);
}

// Direct return from game screen → city modal (no topic animation needed)
function returnToCity(topic) {
  state.selectedTopic = topic;
  $('city-modal-title').textContent = topic.name;
  $('city-completed-num').textContent = `${topic.completed}/${topic.total}`;

  const track = $('city-header-track');
  track.innerHTML = '';
  for (let i = 0; i < topic.total; i++) {
    const seg = document.createElement('div');
    seg.className = 'city-header-seg' + (i < topic.completed ? ' done' : '');
    track.appendChild(seg);
  }

  renderCityCards(topic);

  // Hide game screen, restore welcome screen background, show city modal directly
  $('game-screen').classList.add('hidden');
  $('topic-modal-screen').classList.add('hidden');
  $('city-modal-screen').classList.remove('hidden');
  $('welcome-screen').classList.remove('hidden');
  document.querySelector('.welcome-modal').classList.add('hidden');

  const cityBox = document.querySelector('.modal-type-city');
  cityBox.classList.add('is-open');

  state.view = 'city';
  playMenuMusic();
  $('welcome-sound-btn').classList.remove('hidden');
}

function goToWordList(category) {
  state.selectedCategory = category;
  renderWordList(getWords(category.csvTopic, state.difficulty));
  // Don't call showView — keep city screen visible behind word list
  $('word-list-screen').classList.remove('hidden');
  state.view = 'wordlist';
}

function goToGame(category) {
  state.selectedCategory = category;
  state.round    = 1;
  state.score    = 0;
  state.usedIdxs = [];
  updateHUD();
  showView('game');
  initPoppers();
  startRound();
}

function goBack() {
  switch (state.view) {
    case 'topic':    goToWelcome();                    break;
    case 'city': {
      const cityBox  = document.querySelector('.modal-type-city');
      const topicBox = document.querySelector('.modal-type-topic');

      // 1. Slide city modal back to the right
      cityBox.classList.remove('is-open');

      // 2. Show topic screen, fade topic modal in from opacity 0
      $('topic-modal-screen').classList.remove('hidden');
      topicBox.classList.add('is-open');
      topicBox.style.opacity = '0';
      state.view = 'topic';
      requestAnimationFrame(() => requestAnimationFrame(() => {
        topicBox.style.opacity = '';
      }));

      // 3. After city slides out, hide city screen
      setTimeout(() => {
        $('city-modal-screen').classList.add('hidden');
      }, 600);
      break;
    }
    case 'wordlist': {
      $('word-list-screen').classList.add('hidden');
      $('city-modal-screen').classList.remove('hidden');
      state.view = 'city';
      break;
    }
    case 'game':
      stopGame();
      returnToCity(state.selectedTopic);
      break;
  }
}

function diffIconSVG(d) {
  const configs = {
    Basic:        { l: '#1CB0F6', m: '#DFE6EA', r: '#DFE6EA' },
    Intermediate: { l: '#78C801', m: '#78C801', r: '#DFE6EA' },
    Advanced:     { l: '#FF9601', m: '#FF9601', r: '#FF9601' },
  };
  const c = configs[d] || configs.Basic;
  return `<svg width="35" height="33" viewBox="0 0 35 33" fill="none" xmlns="http://www.w3.org/2000/svg">

// ════════════════════════════════════════════════
//  GAME LOGIC
// ════════════════════════════════════════════════

function stopGame() {
  cancelAnimationFrame(state.rafId);
  state.phase = 'idle';
}

function startRound() {
  cancelAnimationFrame(state.rafId);
  state.phase = 'idle';

  // Reset visuals
  $('balloon-group').style.transition = '';
  $('balloon-left').classList.remove('pop');
  $('balloon-right').classList.remove('pop');
  $('balloon-left').style.opacity   = '1';
  $('balloon-right').style.opacity  = '1';
  // Reset popper overlays
  $('popper-left').classList.add('hidden');
  $('popper-right').classList.add('hidden');
  initPoppers();
  $('word-frame').classList.remove('fall');
  $('word-frame').style.opacity     = '1';
  $('check-icon').classList.remove('show');
  $('game-modal-overlay').classList.add('hidden');
  // Reset fertig-specific modal overrides
  delete $('game-modal-overlay').dataset.fertig;
  document.querySelector('.gm-correct-block').style.display = '';
  $('try-again-btn').textContent = 'Try again';
  $('main-menu-btn').style.display = '';
  $('modal-english').style.fontWeight = '';
  $('modal-english').style.fontSize   = '';
  $('modal-english').style.color      = '';

  // Pick word
  const words = state.selectedCategory
    ? getWords(state.selectedCategory.csvTopic, state.difficulty)
    : DB;
  let pool = words.map((_, i) => i).filter(i => !state.usedIdxs.includes(i));
  if (pool.length === 0) { state.usedIdxs = []; pool = words.map((_, i) => i); }
  const idx = pool[Math.floor(Math.random() * pool.length)];
  state.usedIdxs.push(idx);
  state.word = words[idx];

  $('german-word').textContent  = state.word.german;
  $('english-word').textContent = state.word.english;

  // Position and speed
  state.balloonY = window.innerHeight + 120;
  state.startY   = state.balloonY;
  applyY(0);
  setBtns(true);
  speakWord(state.word.german); // 600 ms delay, de-DE TTS

  state.startTime = performance.now();
  state.phase = 'rising';
  state.rafId = requestAnimationFrame(tick);
}

function tick() {
  if (state.phase !== 'rising') return;

  const elapsed = performance.now() - state.startTime;
  const t = Math.min(elapsed / RISE_DURATION_MS, 1);

  // Ease-out: lassul de nem áll le (kisebb kitevő = laposabb lassulás)
  const easeOut = 1 - Math.pow(1 - t, 1.5);
  const eased   = 0.65 * easeOut + 0.35 * t;

  // Total travel: well above screen top
  const startY = state.startY;
  const endY   = -48;
  state.balloonY = startY + (endY - startY) * eased;

  applyY(elapsed);

  if (state.balloonY <= -48) { handleWrong('timeout'); return; }
  state.rafId = requestAnimationFrame(tick);
}

function applyY(elapsed) {
  const t = elapsed !== undefined ? elapsed : (performance.now() - state.startTime);
  // Wind sway: gentle sine oscillation, 1.5 cycles over full duration, ±12px
  const sway = Math.sin((t / RISE_DURATION_MS) * Math.PI * 3) * 12;
  $('balloon-group').style.transform =
    `translateX(calc(-50% + ${sway}px)) translateY(${state.balloonY}px)`;
}

function handleCorrect() {
  state.phase = 'animating';
  cancelAnimationFrame(state.rafId);
  setBtns(false);
  cancelTTS();

  const $bg = $('balloon-group');
  // Fly out just barely above the viewport top + 300px
  const exitY = -(window.innerHeight * 0.15 + 100);
  $bg.style.transition = 'transform 500ms cubic-bezier(0.4, 0, 0.2, 1)';
  $bg.style.transform  = `translateX(-50%) translateY(${exitY}px)`;

  setTimeout(() => {
    $bg.style.transition = '';
    $('check-icon').classList.add('show');
    playSFX('correct');
    state.score++;
    updateHUD();

    setTimeout(() => {
      $('check-icon').classList.remove('show');
      if (state.round >= TOTAL_ROUNDS) {
        finishGame();
      } else {
        state.round++;
        updateHUD();
        startRound();
      }
    }, 900);
  }, 300);
}

function handleWrong(reason) {
  state.phase = 'animating';
  cancelAnimationFrame(state.rafId);
  setBtns(false);
  cancelTTS();

  $('balloon-left').classList.add('pop');
  $('balloon-right').classList.add('pop');
  playSFX('pop');
  playPoppers();

  setTimeout(() => {
    $('balloon-left').style.opacity  = '0';
    $('balloon-right').style.opacity = '0';
    $('word-frame').classList.add('fall');

    setTimeout(() => {
      const cap = s => s.charAt(0).toUpperCase() + s.slice(1);
      if (reason === 'timeout') {
        $('modal-title').textContent = "Time's up!";
      } else {
        $('modal-title').textContent = "Incorrect!";
      }
      $('modal-title').className = 'gm-title';
      if (state.score > state.highScore) state.highScore = state.score;
      updateHUD();
      const art = state.word.article;
      const capArt = art.charAt(0).toUpperCase() + art.slice(1);
      $('modal-article-word').innerHTML =
        `<span class="article-colored ${art}">${capArt}</span> ${state.word.german}`;
      $('modal-english').textContent      = state.word.english;
      $('modal-score').textContent        = state.score;
      $('modal-hs').textContent           = state.highScore;
      playSFX('incorrect');
      $('game-modal-overlay').classList.remove('hidden');
    }, 580);
  }, 300);
}

function finishGame() {
  if (state.score > state.highScore) state.highScore = state.score;
  updateHUD();
  $('modal-title').textContent       = '🎉 Fertig!';
  $('modal-title').className         = 'gm-title correct';
  $('modal-article-word').innerHTML  = '';
  $('modal-english').textContent     = `You scored ${state.score} out of ${TOTAL_ROUNDS}!`;
  $('modal-english').style.fontWeight = '800';
  $('modal-english').style.fontSize   = 'clamp(15px, 1.4vw, 20px)';
  $('modal-english').style.color      = '#144e56';
  $('modal-score').textContent       = state.score;
  $('modal-hs').textContent          = state.highScore;
  // Fertig state: hide correct-article block, rename button, hide main-menu btn
  $('game-modal-overlay').dataset.fertig = '1';
  document.querySelector('.gm-correct-block').style.display = 'none';
  $('try-again-btn').textContent = 'Main menu';
  $('main-menu-btn').style.display = 'none';
  playSFX('highScore');
  $('game-modal-overlay').classList.remove('hidden');
}

function setBtns(on) {
  document.querySelectorAll('.article-btn').forEach(b => b.disabled = !on);
}

function updateHUD() {
  $('hs-val').textContent    = state.highScore;
  $('round-val').textContent = `${state.round} / ${TOTAL_ROUNDS}`;
  $('score-val').textContent = state.score;
  const pct = ((state.round - 1) / TOTAL_ROUNDS) * 100;

// ── Zene (loop) ──────────────────────────────────
const audioMenu = $('audio-menu');
const audioGame = $('audio-game');
audioMenu.volume = 0.40;
audioGame.volume = 0.40;

// ── Web Audio API – zéró latencia SFX ────────────
// Az Audio() elemekkel ellentétben a decodeAudioData előre dekódolja a hangot,
// így a lejátszás azonnal, delay nélkül indul el.
const _actx = new (window.AudioContext || window.webkitAudioContext)();
const _sfxVolumes = { correct: 0.9, pop: 1.0, incorrect: 0.9, highScore: 0.9, click: 0.6 };
const _sfxBuffers = {};

async function _loadSFX(key, url) {
  try {
    const res = await fetch(url);
    const ab  = await res.arrayBuffer();
    _sfxBuffers[key] = await _actx.decodeAudioData(ab);
  } catch (e) { /* fájl hiányában csendben folytatja */ }
}

// Minden SFX előre betölt
Promise.all([
  _loadSFX('correct',   'Correct.mp3'),
  _loadSFX('pop',       'Wrong-Answer-Balloon-Pop.mp3'),
  _loadSFX('incorrect', 'Incorrect.mp3'),
  _loadSFX('highScore', 'High-Score.mp3'),
  _loadSFX('click',     'Menu-Click.mp3'),
]);

function playSFX(key) {
  if (!state.soundOn) return;
  const buf = _sfxBuffers[key];
  if (!buf) return;
  // AudioContext lehet suspended (autoplay policy) – resume egyszer
  if (_actx.state === 'suspended') _actx.resume();
  const src  = _actx.createBufferSource();
  const gain = _actx.createGain();
  gain.gain.value = _sfxVolumes[key] ?? 1;
  src.buffer = buf;
  src.connect(gain);
  gain.connect(_actx.destination);
  src.start(0);
}

// ── TTS – szó kimondása de-DE hangon ─────────────
let _ttsTimer = null;
function speakWord(word) {
  clearTimeout(_ttsTimer);
  if (!state.soundOn || !window.speechSynthesis) return;
  _ttsTimer = setTimeout(() => {
    if (!state.soundOn) return;
    window.speechSynthesis.cancel();
    const utt = new SpeechSynthesisUtterance(word);
    utt.lang    = 'de-DE';
    utt.rate    = 0.88;
    utt.pitch   = 1;
    utt.volume  = 1;
    window.speechSynthesis.speak(utt);
  }, 600);
}

function cancelTTS() {
  clearTimeout(_ttsTimer);
  if (window.speechSynthesis) window.speechSynthesis.cancel();
}

// ════════════════════════════════════════════════
//  DRAG-TO-SCROLL + HOVER ARROWS
// ════════════════════════════════════════════════
// ── Shared global drag state (one instance for all scroll containers) ─────────
const _drag = {
  el: null, startX: 0, startPageX: 0, scrollLeft: 0,
  lastX: 0, lastT: 0, velX: 0, didDrag: false, rafId: null,
  momentumEl: null,  // separate ref kept alive during momentum
};
const _FRICTION = 0.92, _MIN_VEL = 0.5, _DRAG_THRESHOLD = 5;

function _stopMomentum() {
  if (_drag.rafId) { cancelAnimationFrame(_drag.rafId); _drag.rafId = null; }
  _drag.momentumEl = null;
}
function _momentumLoop() {
  if (!_drag.momentumEl) return;
  _drag.velX *= _FRICTION;
  if (Math.abs(_drag.velX) < _MIN_VEL) { _stopMomentum(); return; }
  _drag.momentumEl.scrollLeft -= _drag.velX;
  _drag.rafId = requestAnimationFrame(_momentumLoop);
}
window.addEventListener('mousemove', e => {
  if (!_drag.el) return;
  const walk = (e.pageX - _drag.el.offsetLeft - _drag.startX) * 1.2;
  _drag.el.scrollLeft = _drag.scrollLeft - walk;
  const dt = e.timeStamp - _drag.lastT || 1;
  _drag.velX  = ((e.pageX - _drag.lastX) / dt) * 16;
  _drag.lastX = e.pageX;
  _drag.lastT = e.timeStamp;
  if (Math.abs(e.pageX - _drag.startPageX) > _DRAG_THRESHOLD) _drag.didDrag = true;
});
window.addEventListener('mouseup', () => {
  if (!_drag.el) return;
  _drag.el.style.cursor = '';
  _drag.el.style.userSelect = '';
  if (Math.abs(_drag.velX) > _MIN_VEL) {
    _drag.momentumEl = _drag.el;  // keep ref alive after el is cleared
    _drag.rafId = requestAnimationFrame(_momentumLoop);
  }
  _drag.el = null;
});
// ─────────────────────────────────────────────────────────────────────────────

function initHorizontalScroll(scrollEl) {
  scrollEl.addEventListener('mousedown', e => {
    _stopMomentum();
    _drag.el         = scrollEl;
    _drag.didDrag    = false;
    _drag.startX     = e.pageX - scrollEl.offsetLeft;
    _drag.startPageX = e.pageX;
    _drag.scrollLeft = scrollEl.scrollLeft;
    _drag.lastX      = e.pageX;
    _drag.lastT      = e.timeStamp;
    _drag.velX       = 0;
    scrollEl.style.cursor = 'grabbing';
    scrollEl.style.userSelect = 'none';
  });

  scrollEl.addEventListener('click', e => {
    if (_drag.didDrag) {
      e.stopPropagation();
      e.preventDefault();
      _drag.didDrag = false;
    }
  }, true);

  // ── Hover arrows ────────────────────────────
  const wrap = scrollEl.parentElement;
  wrap.style.position = 'relative';

  function makeArrow(dir) {
    const btn = document.createElement('button');
    btn.className  = 'scroll-arrow scroll-arrow-' + dir;
    btn.innerHTML  = dir === 'left' ? '‹' : '›';
    btn.style.cssText = `
      position: absolute;
      top: 50%;
      ${dir}: 10px;
      transform: translateY(-50%);
      z-index: 20;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1.5px solid #ccc;
      background: rgba(255,255,255,0.92);
      font-size: 1.4rem;
      line-height: 1;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
      transition: background 100ms;
    `;
    btn.addEventListener('mouseenter', () => btn.style.background = '#f0f0f0');
    btn.addEventListener('mouseleave', () => btn.style.background = 'rgba(255,255,255,0.92)');
    btn.addEventListener('click', () => {
      scrollEl.scrollBy({ left: dir === 'left' ? -360 : 360, behavior: 'smooth' });
    });
    wrap.appendChild(btn);
    return btn;
  }

  const arrowL = makeArrow('left');
  const arrowR = makeArrow('right');

  function updateArrows() {
    const show = dir => { dir.style.display = 'flex'; };
    const hide = dir => { dir.style.display = 'none'; };
    scrollEl.scrollLeft > 4 ? show(arrowL) : hide(arrowL);
    scrollEl.scrollLeft < scrollEl.scrollWidth - scrollEl.clientWidth - 4
      ? show(arrowR) : hide(arrowR);
  }

  wrap.addEventListener('mouseenter', updateArrows);
  wrap.addEventListener('mouseleave', () => {
    arrowL.style.display = 'none';
    arrowR.style.display = 'none';
  });
  scrollEl.addEventListener('scroll', () => {
    if (wrap.matches(':hover')) updateArrows();
  });
}

// ════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════
loadDB().then(() => {
  showView('welcome');
  initHorizontalScroll($('topic-scroll'));
  initHorizontalScroll($('city-scroll'));
});
